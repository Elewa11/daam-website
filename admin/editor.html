<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر الصفحات البصري</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #004aad;
            --success: #28a745;
            --danger: #dc3545;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Tajawal', sans-serif;
        }
        .toolbar {
            height: 60px;
            background: #1e293b;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: relative;
            z-index: 100;
        }
        .toolbar-title { font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .toolbar-btns { display: flex; gap: 10px; }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-save { background: var(--success); color: white; }
        .btn-back { background: rgba(255,255,255,0.1); color: white; text-decoration: none; font-size: 0.9rem; }
        .btn:hover { opacity: 0.9; }

        #editor-frame {
            width: 100%;
            height: calc(100% - 60px);
            border: none;
        }
        
        /* Notification style */
        #status-msg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            display: none;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-title">
            <a href="index.html" class="btn-back"><i class="fas fa-arrow-right"></i> رجوع</a>
            <span id="page-name">جاري التحميل...</span>
        </div>
        <div class="toolbar-btns">
            <button class="btn btn-save" onclick="publishChanges()">
                <i class="fas fa-cloud-upload-alt"></i> نشر التعديلات
            </button>
        </div>
    </div>

    <iframe id="editor-frame"></iframe>

    <div id="status-msg"></div>

    <script src="publisher.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('page') || 'index.html';
        const frame = document.getElementById('editor-frame');
        
        document.getElementById('page-name').innerText = `تعديل: ${page}`;
        
        // Use a relative path to load the actual site page into the iframe
        frame.src = `../${page}`;

        frame.onload = () => {
            showMsg('تم تفعيل وضع التعديل البصري. اضغط على أي نص للتعديل.', '#3b82f6');
            
            const doc = frame.contentDocument || frame.contentWindow.document;
            
            // Inject contentEditable to all text elements
            const textElements = doc.querySelectorAll('h1, h2, h3, h4, h5, h6, p, a, span, li, b, strong');
            textElements.forEach(el => {
                // Don't make nav links or buttons redirect during editing
                if (el.tagName === 'A') {
                    el.onclick = (e) => e.preventDefault();
                }
                el.contentEditable = 'true';
                el.style.outline = 'none';
                
                el.onfocus = () => { el.style.boxShadow = '0 0 0 2px #3b82f6'; };
                el.onblur = () => { el.style.boxShadow = 'none'; };
            });

            // Prevent all internal links from navigating
            doc.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', (e) => e.preventDefault());
            });
        };

        function showMsg(html, color) {
            const msg = document.getElementById('status-msg');
            msg.innerHTML = html;
            msg.style.background = color;
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 4000);
        }
    </script>
</body>
</html>
