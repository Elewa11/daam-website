<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم مؤسسة دعم — محرر الموقع</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="admin.css">
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
</head>

<body>
    <!-- ============ LOGIN SCREEN ============ -->
    <div id="loginScreen" class="login-screen">
        <div class="login-bg-pattern"></div>
        <div class="login-card">
            <div class="login-logo">
                <img src="../assets/images/logo_header.png" alt="Daam Foundation" height="70" style="filter: brightness(0) invert(1);">
            </div>
            <h1 class="login-title">محرر الموقع المباشر</h1>
            <p class="login-subtitle">تعديل محتوى الموقع وتصفحه بسهولة</p>

            <div class="login-form">
                <div class="input-group">
                    <label for="adminPassword">كلمة المرور</label>
                    <input type="password" id="adminPassword" placeholder="أدخل كلمة المرور" autocomplete="current-password">
                </div>
                <button id="loginBtn" class="btn-login" onclick="handleLogin()">
                    <span class="btn-text">تسجيل الدخول</span>
                    <span class="btn-loader" style="display:none"></span>
                </button>
                <p id="loginError" class="login-error" style="display:none">كلمة المرور غير صحيحة.</p>
            </div>

            <div id="setupSection" class="setup-section" style="display:none">
                <div class="setup-divider"><span>إعدادات النشر</span></div>
                <div class="input-group">
                    <label for="githubToken">GitHub Token</label>
                    <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
                </div>
                <button class="btn-setup" onclick="saveSetup()">حفظ الإعدادات</button>
            </div>
        </div>
    </div>

    <!-- ============ FULL SCREEN EDITOR ============ -->
    <div id="editorView" class="editor-view" style="display:none;">
        
        <!-- Floating Toolbar -->
        <div class="floating-toolbar">
            <div class="toolbar-left">
                <img src="../assets/images/logo_header.png" alt="Daam" height="30" style="filter: brightness(0) invert(1); margin-left: 15px;">
                <span class="page-indicator">الصفحة الحالية: <span id="currentPageLabel">index.html</span></span>
            </div>

            <div class="toolbar-center">
                <!-- Toggle Switch -->
                <div class="mode-toggle">
                    <span class="mode-label" id="browseLabel">تصفح</span>
                    <label class="switch">
                        <input type="checkbox" id="modeSwitch" onchange="toggleMode()">
                        <span class="slider round"></span>
                    </label>
                    <span class="mode-label active-mode" id="editLabel">تعديل</span>
                </div>
            </div>

            <div class="toolbar-right">
                <span id="changeCounter" class="change-counter" style="display:none">0 تعديلات</span>
                <button id="btnSave" class="btn-save" onclick="saveChanges()" disabled>نشر التعديلات</button>
                <button class="btn-logout-small" onclick="handleLogout()" title="تسجيل الخروج">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>

        <!-- Iframe container takes full space beneath toolbar -->
        <div class="iframe-container">
            <iframe id="editorFrame" class="editor-frame" sandbox="allow-same-origin allow-scripts allow-forms allow-modals"></iframe>
        </div>
    </div>

    <!-- Image Upload Modal -->
    <div id="imageModal" class="modal-overlay" style="display:none">
        <div class="modal-card">
            <h3>استبدال الصورة</h3>
            <p>اختر صورة جديدة لاستبدال الصورة الحالية:</p>
            <div class="modal-preview">
                <img id="modalPreview" src="" alt="Preview">
            </div>
            <div class="modal-upload-area" id="dropZone">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <p>اسحب الصورة هنا، أو <strong>اضغط للتصفح</strong></p>
                <input type="file" id="imageInput" accept="image/*" style="display:none">
            </div>
            <div class="modal-actions">
                <button class="btn-modal btn-modal-cancel" onclick="closeImageModal()">إلغاء</button>
                <button class="btn-modal btn-modal-confirm" id="btnConfirmImage" onclick="confirmImageReplace()" disabled>استخدم هذه الصورة</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast" style="display:none">
        <span id="toastMessage" class="toast-message"></span>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display:none">
        <div class="loading-spinner"></div>
        <p id="loadingText">جاري المعالجة...</p>
    </div>

    <script src="admin.js"></script>
</body>
</html>
